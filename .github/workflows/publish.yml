name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ "8.0.x", "10.0.x" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Restore
        run: dotnet restore src/Robotico.Validation/Robotico.Validation.csproj tests/Robotico.Validation.Tests/Robotico.Validation.Tests.csproj
      - name: Build
        run: dotnet build src/Robotico.Validation/Robotico.Validation.csproj tests/Robotico.Validation.Tests/Robotico.Validation.Tests.csproj -c Release --no-restore
      - name: Test
        run: dotnet test tests/Robotico.Validation.Tests/Robotico.Validation.Tests.csproj --no-build -c Release --verbosity normal

  publish-nuget:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Derive version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VER=$(grep '<Version>' Directory.Build.props | sed 's/.*<Version>\([^<]*\)<\/Version>.*/\1/')
            echo "version=$VER" >> $GITHUB_OUTPUT
          fi
      - name: Restore
        run: dotnet restore src/Robotico.Validation/Robotico.Validation.csproj
      - name: Pack
        run: dotnet pack src/Robotico.Validation/Robotico.Validation.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }} -o artifacts
      - name: Push to GitHub Packages
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
