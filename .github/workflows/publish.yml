# Aligned with robotico-mediator-csharp: same triggers, jobs, env, permissions. Coverage 90% (robotico-results-csharp bar).
name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      matrix:
        dotnet-version: [ "8.0.x", "10.0.x" ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source github --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Restore
        run: |
          dotnet restore src/Robotico.Validation/Robotico.Validation.csproj
          dotnet restore tests/Robotico.Validation.Tests/Robotico.Validation.Tests.csproj

      - name: Build
        run: |
          dotnet build src/Robotico.Validation/Robotico.Validation.csproj -c Release --no-restore
          dotnet build tests/Robotico.Validation.Tests/Robotico.Validation.Tests.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/Robotico.Validation.Tests/Robotico.Validation.Tests.csproj --no-build -c Release --verbosity normal \
            --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Check coverage threshold (90% line)
        run: |
          COV_FILE=$(find ./coverage -name 'coverage.cobertura.xml' 2>/dev/null | head -1)
          if [ -z "$COV_FILE" ]; then echo "No coverage file found"; exit 1; fi
          RATE=$(sed -n 's/.*line-rate="\([^"]*\)".*/\1/p' "$COV_FILE" | head -1)
          if [ -z "$RATE" ]; then echo "Could not parse line-rate"; exit 1; fi
          PERCENT=$(echo "$RATE * 100" | bc)
          echo "Line coverage: ${PERCENT}%"
          if [ "$(echo "$RATE < 0.90" | bc)" -eq 1 ]; then echo "Coverage ${PERCENT}% is below 90%"; exit 1; fi

      - name: Upload coverage (main/PR)
        uses: codecov/codecov-action@v4
        if: matrix.dotnet-version == '10.0.x' && (github.event_name == 'push' || github.event_name == 'pull_request')
        with:
          directory: ./coverage
          fail_ci_if_error: false

  trim-validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source github --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Restore
        run: dotnet restore src/Robotico.Validation/Robotico.Validation.csproj

      - name: Build with trim analyzer (validates trim-friendly; TreatWarningsAsErrors fails on trim warnings)
        run: |
          dotnet build src/Robotico.Validation/Robotico.Validation.csproj -c Release --no-restore \
            -p:IsTrimmable=true -p:EnableTrimAnalyzer=true

  publish-nuget:
    needs: [build-and-test, trim-validate]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    if: github.event_name == 'release' && github.event.action == 'published' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source github --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Derive version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VER=$(grep '<Version>' Directory.Build.props | sed 's/.*<Version>\([^<]*\)<\/Version>.*/\1/')
            echo "version=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        run: |
          dotnet restore src/Robotico.Validation/Robotico.Validation.csproj
          dotnet restore tests/Robotico.Validation.Tests/Robotico.Validation.Tests.csproj

      - name: Pack
        run: |
          dotnet pack src/Robotico.Validation/Robotico.Validation.csproj -c Release --no-restore \
            -p:Version=${{ steps.version.outputs.version }} -o artifacts

      - name: Push to GitHub Packages
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
