name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source github --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Restore
        run: dotnet restore benchmarks/Robotico.Validation.Benchmarks/Robotico.Validation.Benchmarks.csproj

      - name: Build benchmarks
        run: dotnet build benchmarks/Robotico.Validation.Benchmarks/Robotico.Validation.Benchmarks.csproj -c Release --no-restore

      - name: Run benchmarks (ShortRun)
        run: |
          dotnet run --project benchmarks/Robotico.Validation.Benchmarks/Robotico.Validation.Benchmarks.csproj -c Release -f net8.0 --no-build -- --filter "*" --job ShortRun
        id: run-benchmarks

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always() && steps.run-benchmarks.outcome != 'cancelled'
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            **/BenchmarkDotNet.Artifacts/**
            benchmarks/**/BenchmarkDotNet.Artifacts/**
          retention-days: 30
